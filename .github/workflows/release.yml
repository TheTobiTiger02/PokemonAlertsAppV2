name: Build & Publish Release

on:
  push:
    branches:
      - main # Triggers on every push to main

permissions:
  contents: write # Required to upload releases and attach assets

jobs:
  build:
    name: Build Signed APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Check if version tag exists
        id: tag_check
        run: |
          VERSION_NAME=$(grep "versionName =" app/build.gradle.kts | sed 's/.*"\(.*\)".*/\1/')
          echo "version=$VERSION_NAME" >> $GITHUB_OUTPUT
          
          git fetch --tags
          if git rev-parse "v$VERSION_NAME" >/dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "Version v$VERSION_NAME already exists as a tag. Skipping build."
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "Version v$VERSION_NAME does not exist. Proceeding with build."
          fi

      - name: Set up JDK 17
        if: steps.tag_check.outputs.exists == 'false'
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Gradle
        if: steps.tag_check.outputs.exists == 'false'
        uses: gradle/actions/setup-gradle@v4

      - name: Restore Firebase configuration
        if: steps.tag_check.outputs.exists == 'false'
        env:
          GOOGLE_SERVICES_JSON_BASE64: ${{ secrets.GOOGLE_SERVICES_JSON_BASE64 }}
        run: |
          set -euo pipefail
          if [ -z "$GOOGLE_SERVICES_JSON_BASE64" ]; then
            echo "::error::GOOGLE_SERVICES_JSON_BASE64 is not configured."
            exit 1
          fi
          printf '%s' "$GOOGLE_SERVICES_JSON_BASE64" | base64 --decode > app/google-services.json
          test -s app/google-services.json

      # Decode Keystore file from base64 secret
      - name: Decode Keystore
        if: steps.tag_check.outputs.exists == 'false'
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          mkdir -p keystore
          echo "$KEYSTORE_BASE64" | base64 --decode > keystore/pokemon-alerts-release.jks

      # Re-create keystore.properties and local.properties on build machine
      - name: Create Properties Files
        if: steps.tag_check.outputs.exists == 'false'
        env:
          STORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEYSTORE_KEY_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEYSTORE_ALIAS }}
          GOOGLE_MAPS_API_KEY: ${{ secrets.GOOGLE_MAPS_API_KEY }}
        run: |
          echo "storeFile=keystore/pokemon-alerts-release.jks" > keystore.properties
          echo "storePassword=$STORE_PASSWORD" >> keystore.properties
          echo "keyAlias=$KEY_ALIAS" >> keystore.properties
          echo "keyPassword=$KEY_PASSWORD" >> keystore.properties
          
          echo "GOOGLE_MAPS_API_KEY=$GOOGLE_MAPS_API_KEY" > local.properties

      - name: Test and build release APK
        if: steps.tag_check.outputs.exists == 'false'
        run: |
          ./gradlew \
            testDebugUnitTest \
            testReleaseUnitTest \
            compileDebugAndroidTestKotlin \
            lintRelease \
            assembleRelease

      - name: Verify release APK
        if: steps.tag_check.outputs.exists == 'false'
        run: |
          set -euo pipefail
          APK="app/build/outputs/apk/release/app-release.apk"
          BUILD_TOOLS_VERSION=$(find "$ANDROID_HOME/build-tools" -mindepth 1 -maxdepth 1 -type d -printf '%f\n' | sort -V | tail -n 1)
          AAPT2="$ANDROID_HOME/build-tools/$BUILD_TOOLS_VERSION/aapt2"
          APKSIGNER="$ANDROID_HOME/build-tools/$BUILD_TOOLS_VERSION/apksigner"

          test -s "$APK"
          "$APKSIGNER" verify --verbose --print-certs "$APK"

          RESOURCES=$("$AAPT2" dump resources "$APK")
          for resource in gcm_defaultSenderId google_api_key google_app_id project_id; do
            if ! grep -q "string/$resource" <<< "$RESOURCES"; then
              echo "::error::Release APK is missing Firebase resource string/$resource."
              exit 1
            fi
          done

          SEEDS="app/build/outputs/mapping/release/seeds.txt"
          grep -q "com.example.pokemonalertsv2.fcm.PokemonFirebaseMessagingService" "$SEEDS"
          grep -q "com.example.pokemonalertsv2.work.FcmAlertWorker" "$SEEDS"

          sha256sum "$APK" > "$APK.sha256"

      # Publish the Release and attach the APK asset
      - name: Create GitHub Release
        if: steps.tag_check.outputs.exists == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.tag_check.outputs.version }}
          name: Release v${{ steps.tag_check.outputs.version }}
          files: |
            app/build/outputs/apk/release/app-release.apk
            app/build/outputs/apk/release/app-release.apk.sha256
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
